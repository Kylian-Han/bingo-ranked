<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player — Bingo Ranked</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
</head>
<body>
  <header class="site-header"></header>
  <main>
    <div class="container" id="root">
      <div class="card"><div class="skeleton" style="height: 32px;"></div></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    (async function () {
      window.ui.renderHeader('');
      const root = document.getElementById('root');
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) {
        window.ui.clear(root);
        root.appendChild(window.ui.el('div', { class: 'card empty-state', text: 'Missing ?id=username in URL.' }));
        return;
      }

      let data;
      try {
        data = await window.api.player(id);
      } catch (err) {
        window.ui.clear(root);
        const msg = err.status === 404 ? 'Player not found.' : 'Failed to load player.';
        root.appendChild(window.ui.el('div', { class: 'card empty-state', text: msg }));
        return;
      }

      window.ui.clear(root);

      // Header
      const titleRow = window.ui.el('div', { class: 'row' }, [
        window.ui.el('h1', { text: data.site_username || data.mc_username }),
        data.site_username
          ? window.ui.el('span', { class: 'linked-tag', text: 'linked' })
          : null,
      ]);
      root.appendChild(titleRow);
      root.appendChild(window.ui.el('p', { class: 'subtitle' }, [
        'Minecraft username: ',
        window.ui.el('strong', { text: data.mc_username }),
      ]));

      // Stats overview
      const t = data.totals;
      const overview = window.ui.el('div', { class: 'card' }, [
        window.ui.el('h2', { text: 'Overview' }),
        window.ui.el('div', { class: 'stats-grid' }, [
          stat('Wins', String(t.wins ?? 0)),
          stat('Games', String(t.games ?? 0)),
          stat('Win rate', `${t.win_rate ?? 0}%`),
          stat('Avg time (last 10)', window.ui.formatDuration(data.avg_duration_seconds_last_10)),
        ]),
      ]);
      root.appendChild(overview);

      // Per-mode breakdown
      if (data.wins_by_mode.length) {
        const head = window.ui.el('thead', {}, [
          window.ui.el('tr', {}, [
            window.ui.el('th', { text: 'Mode' }),
            window.ui.el('th', { text: 'Wins' }),
            window.ui.el('th', { text: 'Games' }),
            window.ui.el('th', { text: 'Win rate' }),
          ]),
        ]);
        const body = window.ui.el('tbody');
        for (const m of data.wins_by_mode) {
          const rate = m.games > 0 ? Math.round((m.wins / m.games) * 1000) / 10 : 0;
          body.appendChild(window.ui.el('tr', {}, [
            window.ui.el('td', { text: window.ui.modeLabel(m.mode) }),
            window.ui.el('td', { text: String(m.wins) }),
            window.ui.el('td', { text: String(m.games) }),
            window.ui.el('td', { text: rate + '%' }),
          ]));
        }
        const card = window.ui.el('div', { class: 'card' }, [
          window.ui.el('h2', { text: 'Wins by mode' }),
          window.ui.el('div', { class: 'table-wrap' }, [
            window.ui.el('table', {}, [head, body]),
          ]),
        ]);
        root.appendChild(card);
      }

      // Recent games
      const recentCard = window.ui.el('div', { class: 'card' }, [
        window.ui.el('h2', { text: 'Last 10 games' }),
      ]);
      if (!data.recent_games.length) {
        recentCard.appendChild(window.ui.el('p', { class: 'muted', text: 'No games yet.' }));
      } else {
        for (const g of data.recent_games) {
          recentCard.appendChild(renderGame(g, data.mc_uuid));
        }
      }
      root.appendChild(recentCard);
    })();

    function stat(label, value) {
      return window.ui.el('div', { class: 'stat' }, [
        window.ui.el('div', { class: 'stat-label', text: label }),
        window.ui.el('div', { class: 'stat-value', text: value }),
      ]);
    }

    function renderGame(g, currentUuid) {
      const won = g.player_won;
      const header = window.ui.el('div', { class: 'row', style: 'gap: 10px; flex-wrap: wrap;' }, [
        window.ui.el('span', { class: `badge ${won ? 'win' : 'loss'}`, text: won ? 'Win' : 'Loss' }),
        window.ui.el('span', { text: window.ui.modeLabel(g.mode) }),
        window.ui.teamBadge(g.player_team),
        window.ui.el('span', { class: 'muted', text: window.ui.formatDuration(g.duration_seconds) }),
        window.ui.el('span', { class: 'muted', text: window.ui.formatRelative(g.ended_at) }),
      ]);

      const others = g.participants.filter((p) => p.mc_uuid !== currentUuid);
      const playersList = window.ui.el('div', { class: 'row', style: 'gap: 10px; margin-top: 8px;' });
      if (!others.length) {
        playersList.appendChild(window.ui.el('span', { class: 'muted', text: 'Solo game.' }));
      } else {
        for (const p of others) {
          const span = window.ui.el('span', { class: 'row', style: 'gap: 4px;' }, [
            window.ui.teamBadge(p.team),
            window.ui.playerLink(p),
          ]);
          playersList.appendChild(span);
        }
      }

      return window.ui.el('div', {
        style: 'padding: 12px 0; border-top: 1px solid var(--border);',
      }, [header, playersList]);
    }
  </script>
</body>
</html>
