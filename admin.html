<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Bingo Ranked</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
  <style>
    .admin-tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .admin-tab {
      padding: 10px 18px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-dim);
      font-size: 14px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .admin-tab:hover { color: var(--text); }
    .admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .admin-panel { display: none; }
    .admin-panel.active { display: block; }

    .user-row td { vertical-align: middle; }
    .actions-cell { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn.sm { padding: 5px 10px; font-size: 13px; }

    .game-row td { vertical-align: middle; }
    .participants-cell { font-size: 12px; color: var(--text-dim); line-height: 1.8; }

    .pagination {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .search-box {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      width: 220px;
    }
    .search-box:focus {
      outline: none;
      border-color: var(--accent);
    }

    .tag.admin {
      background: rgba(210, 153, 34, 0.2);
      color: var(--warning);
      border: 1px solid rgba(210, 153, 34, 0.4);
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 8px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <header class="site-header"></header>
  <main>
    <div class="container">
      <div id="login-section" style="display:none; max-width:380px; margin:60px auto;">
        <h1>Admin</h1>
        <p class="subtitle">Connexion requise.</p>
        <div id="login-alert"></div>
        <form id="login-form" class="form card" style="margin-top:16px;">
          <label>
            Nom d'utilisateur
            <input id="login-username" type="text" autocomplete="username" required />
          </label>
          <label>
            Mot de passe
            <input id="login-password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit" class="btn" id="login-btn">Se connecter</button>
        </form>
      </div>

      <div id="admin-section" style="display:none;">
        <div class="admin-header">
          <div>
            <h1>Panel Admin</h1>
            <p class="subtitle" id="admin-welcome"></p>
          </div>
          <button class="btn secondary sm" id="logout-btn">Déconnexion</button>
        </div>

        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="users">Joueurs</button>
          <button class="admin-tab" data-tab="games">Parties</button>
        </div>

        <!-- USERS PANEL -->
        <div class="admin-panel active" id="panel-users">
          <div class="admin-header">
            <input class="search-box" id="user-search" type="text" placeholder="Rechercher un joueur…" />
            <div id="users-count" class="muted" style="font-size:14px;"></div>
          </div>
          <div id="users-alert"></div>
          <div class="table-wrap" id="users-table-wrap">
            <div class="card"><div class="skeleton" style="height:32px;"></div></div>
          </div>
        </div>

        <!-- GAMES PANEL -->
        <div class="admin-panel" id="panel-games">
          <div id="games-alert"></div>
          <div class="table-wrap" id="games-table-wrap">
            <div class="card"><div class="skeleton" style="height:32px;"></div></div>
          </div>
          <div class="pagination" id="games-pagination"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
  (async function () {
    const BASE = window.RANKED_CONFIG.API_BASE;

    // ── Auth helpers ────────────────────────────────────────────────────────

    async function adminRequest(path, options = {}) {
      return window.api._adminRequest
        ? window.api._adminRequest(path, options)
        : internalRequest(path, options);
    }

    // Reuse api.js internals via a thin wrapper that hits /admin routes.
    async function internalRequest(path, options = {}) {
      const access = localStorage.getItem('ranked.accessToken');
      const headers = { 'Content-Type': 'application/json' };
      if (access) headers['Authorization'] = 'Bearer ' + access;
      const res = await fetch(BASE + '/admin' + path, {
        ...options,
        headers,
        body: options.body ? JSON.stringify(options.body) : undefined,
      });
      if (res.status === 401) {
        // Try refresh once
        const refreshed = await tryRefreshOnce();
        if (refreshed) return internalRequest(path, options);
        showLogin();
        throw new Error('unauthorized');
      }
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
      if (!res.ok) {
        const err = new Error(data?.error || 'http_' + res.status);
        err.status = res.status;
        throw err;
      }
      return data;
    }

    async function tryRefreshOnce() {
      const refreshToken = localStorage.getItem('ranked.refreshToken');
      if (!refreshToken) return false;
      try {
        const data = await window.api.refresh
          ? (async () => { await window.api.refresh?.(); return true; })()
          : (async () => {
              const res = await fetch(BASE + '/auth/refresh', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refreshToken }),
              });
              if (!res.ok) return false;
              const d = await res.json();
              window.api.setSession(d);
              return true;
            })();
        return data;
      } catch { return false; }
    }

    // ── Boot ────────────────────────────────────────────────────────────────

    function showLogin() {
      document.getElementById('login-section').style.display = '';
      document.getElementById('admin-section').style.display = 'none';
    }

    function showAdmin(username) {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('admin-section').style.display = '';
      document.getElementById('admin-welcome').textContent = 'Connecté en tant que ' + username;
    }

    // Check if already logged in and admin
    if (window.api.isLoggedIn()) {
      try {
        const me = await internalRequest('/me');
        showAdmin(me.username);
        window.ui.renderHeader('admin.html');
        loadUsers();
      } catch (e) {
        if (e.message === 'unauthorized' || (e.status === 403)) {
          window.ui.showAlert('#login-alert', 'Accès refusé — ce compte n\'est pas admin.', 'error');
        }
        showLogin();
      }
    } else {
      showLogin();
    }

    // ── Login form ──────────────────────────────────────────────────────────

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      window.ui.hideAlert('#login-alert');
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      try {
        await window.api.login({ username, password });
        const me = await internalRequest('/me');
        showAdmin(me.username);
        window.ui.renderHeader('admin.html');
        loadUsers();
      } catch (e) {
        const msg = e.status === 403
          ? 'Accès refusé — ce compte n\'est pas admin.'
          : e.status === 401 || e.status === 400
          ? 'Identifiants incorrects.'
          : 'Erreur serveur, réessaie.';
        window.ui.showAlert('#login-alert', msg, 'error');
      } finally {
        btn.disabled = false;
      }
    });

    // ── Logout ──────────────────────────────────────────────────────────────

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await window.api.logout();
      showLogin();
    });

    // ── Tabs ────────────────────────────────────────────────────────────────

    let gamesLoaded = false;
    document.querySelectorAll('.admin-tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.admin-tab').forEach((t) => t.classList.remove('active'));
        document.querySelectorAll('.admin-panel').forEach((p) => p.classList.remove('active'));
        tab.classList.add('active');
        const panelId = 'panel-' + tab.dataset.tab;
        document.getElementById(panelId).classList.add('active');
        if (tab.dataset.tab === 'games' && !gamesLoaded) {
          gamesLoaded = true;
          loadGames(0);
        }
      });
    });

    // ── Users ───────────────────────────────────────────────────────────────

    let allUsers = [];

    async function loadUsers() {
      const wrap = document.getElementById('users-table-wrap');
      try {
        const { users } = await internalRequest('/users');
        allUsers = users;
        renderUsers(users);
      } catch {
        window.ui.clear(wrap);
        wrap.appendChild(window.ui.el('div', { class: 'alert error', text: 'Impossible de charger les joueurs.' }));
      }
    }

    document.getElementById('user-search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      renderUsers(allUsers.filter((u) =>
        u.username.toLowerCase().includes(q) ||
        (u.mc_username && u.mc_username.toLowerCase().includes(q)) ||
        (u.email && u.email.toLowerCase().includes(q))
      ));
    });

    function renderUsers(users) {
      const wrap = document.getElementById('users-table-wrap');
      const countEl = document.getElementById('users-count');
      countEl.textContent = users.length + ' joueur' + (users.length > 1 ? 's' : '');
      window.ui.clear(wrap);

      if (!users.length) {
        wrap.appendChild(window.ui.el('div', { class: 'card empty-state', text: 'Aucun joueur.' }));
        return;
      }

      const head = window.ui.el('thead', {}, [
        window.ui.el('tr', {}, [
          window.ui.el('th', { text: 'ID' }),
          window.ui.el('th', { text: 'Compte site' }),
          window.ui.el('th', { text: 'Compte MC' }),
          window.ui.el('th', { text: 'Wins / Games' }),
          window.ui.el('th', { text: 'Inscrit' }),
          window.ui.el('th', { text: 'Actions' }),
        ]),
      ]);

      const body = window.ui.el('tbody');
      for (const u of users) {
        const nameParts = [window.ui.el('span', { text: u.username })];
        if (u.is_admin) nameParts.push(window.ui.el('span', { class: 'tag admin', text: 'ADMIN' }));

        const mcCell = u.mc_username
          ? window.ui.el('td', {}, [
              window.ui.el('div', { text: u.mc_username }),
              window.ui.el('div', { class: 'muted', style: 'font-size:11px;', text: u.mc_uuid }),
            ])
          : window.ui.el('td', { class: 'muted', text: '—' });

        const actions = window.ui.el('div', { class: 'actions-cell' });

        if (u.mc_username) {
          const unlinkBtn = window.ui.el('button', {
            class: 'btn secondary sm',
            text: 'Unlink MC',
            onClick: () => handleUnlink(u.id, u.username, unlinkBtn),
          });
          actions.appendChild(unlinkBtn);
        }

        if (!u.is_admin) {
          const delBtn = window.ui.el('button', {
            class: 'btn danger sm',
            text: 'Supprimer',
            onClick: () => handleDeleteUser(u.id, u.username, delBtn),
          });
          actions.appendChild(delBtn);
        }

        body.appendChild(window.ui.el('tr', { class: 'user-row' }, [
          window.ui.el('td', { class: 'muted', style: 'font-family:var(--mono);font-size:13px;', text: String(u.id) }),
          window.ui.el('td', {}, nameParts),
          mcCell,
          window.ui.el('td', { text: (u.wins ?? 0) + ' / ' + (u.games ?? 0) }),
          window.ui.el('td', { text: window.ui.formatRelative(u.created_at) }),
          window.ui.el('td', {}, [actions]),
        ]));
      }

      wrap.appendChild(window.ui.el('table', {}, [head, body]));
    }

    async function handleUnlink(userId, username, btn) {
      if (!confirm(`Unlink le compte MC de "${username}" ?`)) return;
      btn.disabled = true;
      window.ui.hideAlert('#users-alert');
      try {
        await internalRequest('/users/' + userId + '/link', { method: 'DELETE' });
        await loadUsers();
      } catch (e) {
        window.ui.showAlert('#users-alert', 'Erreur : ' + e.message, 'error');
        btn.disabled = false;
      }
    }

    async function handleDeleteUser(userId, username, btn) {
      if (!confirm(`Supprimer le compte de "${username}" ? Cette action est irréversible.`)) return;
      btn.disabled = true;
      window.ui.hideAlert('#users-alert');
      try {
        await internalRequest('/users/' + userId, { method: 'DELETE' });
        await loadUsers();
      } catch (e) {
        window.ui.showAlert('#users-alert', 'Erreur : ' + e.message, 'error');
        btn.disabled = false;
      }
    }

    // ── Games ───────────────────────────────────────────────────────────────

    const PAGE_SIZE = 50;

    async function loadGames(offset) {
      const wrap = document.getElementById('games-table-wrap');
      window.ui.clear(wrap);
      wrap.appendChild(window.ui.el('div', { class: 'card' }, [
        window.ui.el('div', { class: 'skeleton', style: 'height:32px;' }),
      ]));

      try {
        const data = await internalRequest('/games?limit=' + PAGE_SIZE + '&offset=' + offset);
        renderGames(data.games, data.total, offset);
      } catch {
        window.ui.clear(wrap);
        wrap.appendChild(window.ui.el('div', { class: 'alert error', text: 'Impossible de charger les parties.' }));
      }
    }

    function renderGames(games, total, offset) {
      const wrap = document.getElementById('games-table-wrap');
      window.ui.clear(wrap);

      if (!games.length) {
        wrap.appendChild(window.ui.el('div', { class: 'card empty-state', text: 'Aucune partie.' }));
        renderPagination(0, 0);
        return;
      }

      const head = window.ui.el('thead', {}, [
        window.ui.el('tr', {}, [
          window.ui.el('th', { text: 'ID' }),
          window.ui.el('th', { text: 'Mode' }),
          window.ui.el('th', { text: 'Durée' }),
          window.ui.el('th', { text: 'Équipe gagnante' }),
          window.ui.el('th', { text: 'Joueurs' }),
          window.ui.el('th', { text: 'Date' }),
          window.ui.el('th', { text: 'Actions' }),
        ]),
      ]);

      const body = window.ui.el('tbody');
      for (const g of games) {
        const playerNames = (g.participants || [])
          .map((p) => (p.is_winner ? '★ ' : '') + p.mc_username + ' (' + p.team + ')')
          .join('\n');

        const delBtn = window.ui.el('button', {
          class: 'btn danger sm',
          text: 'Supprimer',
          onClick: () => handleDeleteGame(g.id, delBtn, offset),
        });

        body.appendChild(window.ui.el('tr', { class: 'game-row' }, [
          window.ui.el('td', { class: 'muted', style: 'font-family:var(--mono);font-size:13px;', text: String(g.id) }),
          window.ui.el('td', { text: window.ui.modeLabel(g.mode) }),
          window.ui.el('td', { text: window.ui.formatDuration(g.duration_seconds) }),
          window.ui.el('td', {}, [g.winning_team ? window.ui.teamBadge(g.winning_team) : window.ui.el('span', { class: 'muted', text: '—' })]),
          window.ui.el('td', { class: 'participants-cell' }, [
            window.ui.el('pre', { style: 'margin:0;font-size:11px;font-family:var(--mono);white-space:pre-wrap;', text: playerNames }),
          ]),
          window.ui.el('td', { text: window.ui.formatRelative(g.ended_at) }),
          window.ui.el('td', {}, [delBtn]),
        ]));
      }

      wrap.appendChild(window.ui.el('table', {}, [head, body]));
      renderPagination(total, offset);
    }

    function renderPagination(total, offset) {
      const pag = document.getElementById('games-pagination');
      window.ui.clear(pag);
      if (total <= PAGE_SIZE) return;

      const page = Math.floor(offset / PAGE_SIZE);
      const maxPage = Math.ceil(total / PAGE_SIZE) - 1;

      pag.appendChild(window.ui.el('span', { class: 'muted', style: 'font-size:14px;', text: `Page ${page + 1} / ${maxPage + 1}` }));

      if (page > 0) {
        pag.appendChild(window.ui.el('button', {
          class: 'btn secondary sm',
          text: '← Préc.',
          onClick: () => loadGames((page - 1) * PAGE_SIZE),
        }));
      }
      if (page < maxPage) {
        pag.appendChild(window.ui.el('button', {
          class: 'btn secondary sm',
          text: 'Suiv. →',
          onClick: () => loadGames((page + 1) * PAGE_SIZE),
        }));
      }
    }

    async function handleDeleteGame(gameId, btn, offset) {
      if (!confirm('Supprimer cette partie ? Cette action est irréversible.')) return;
      btn.disabled = true;
      window.ui.hideAlert('#games-alert');
      try {
        await internalRequest('/games/' + gameId, { method: 'DELETE' });
        loadGames(offset);
      } catch (e) {
        window.ui.showAlert('#games-alert', 'Erreur : ' + e.message, 'error');
        btn.disabled = false;
      }
    }

  })();
  </script>
</body>
</html>
