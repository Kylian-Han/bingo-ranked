<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bingo Ranked — Leaderboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
</head>
<body>
  <header class="site-header"></header>
  <main>
    <div class="container">
      <h1>Leaderboard</h1>
      <p class="subtitle" id="board-subtitle">Top bingo players, classés par Elo.</p>

      <div class="controls">
        <label>
          Mode
          <select id="mode-filter">
            <option value="">Tous modes (Elo)</option>
          </select>
        </label>
        <div class="spacer"></div>
        <div class="muted" id="totals"></div>
      </div>

      <div id="leaderboard-wrap">
        <div class="card"><div class="skeleton" style="height: 32px;"></div></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    (async function () {
      window.ui.renderHeader('index.html');

      const wrap = document.getElementById('leaderboard-wrap');
      const totalsEl = document.getElementById('totals');
      const modeSelect = document.getElementById('mode-filter');

      try {
        const { modes } = await window.api.modes();
        for (const m of modes) {
          const opt = window.ui.el('option', { value: m.mode, text: `${window.ui.modeLabel(m.mode)} (${m.games})` });
          modeSelect.appendChild(opt);
        }
      } catch {}

      async function load() {
        window.ui.clear(wrap);
        wrap.appendChild(window.ui.el('div', { class: 'card' }, [
          window.ui.el('div', { class: 'skeleton', style: 'height: 32px;' }),
        ]));
        try {
          const mode = modeSelect.value || undefined;
          const data = await window.api.leaderboard({ mode, limit: 100 });
          totalsEl.textContent =
            `${data.totals.total_games ?? 0} parties · ${data.totals.total_players ?? 0} joueurs`;
          const subtitle = document.getElementById('board-subtitle');
          subtitle.textContent = mode
            ? `Top joueurs en mode ${window.ui.modeLabel(mode)}, classés par victoires.`
            : 'Top joueurs, classés par Elo.';
          renderTable(data.players, !mode);
        } catch (e) {
          window.ui.clear(wrap);
          wrap.appendChild(window.ui.el('div', { class: 'alert error', text: 'Échec du chargement du classement.' }));
        }
      }

      function renderTable(players, eloMode) {
        window.ui.clear(wrap);
        if (!players.length) {
          wrap.appendChild(
            window.ui.el('div', { class: 'card empty-state', text: 'Aucune partie enregistrée.' }),
          );
          return;
        }
        const headCells = [
          window.ui.el('th', { text: '#' }),
          window.ui.el('th', { text: 'Joueur' }),
        ];
        if (eloMode) headCells.push(window.ui.el('th', { text: 'Elo' }));
        headCells.push(
          window.ui.el('th', { text: 'Victoires' }),
          window.ui.el('th', { text: 'Parties' }),
          window.ui.el('th', { text: 'Winrate' }),
        );
        const head = window.ui.el('thead', {}, [window.ui.el('tr', {}, headCells)]);

        const body = window.ui.el('tbody');
        players.forEach((p, i) => {
          const rank = i + 1;
          const cells = [
            window.ui.el('td', { class: `rank rank-${rank}`, text: '#' + rank }),
            window.ui.el('td', {}, [window.ui.playerLink(p)]),
          ];
          if (eloMode) {
            cells.push(window.ui.el('td', { class: 'elo-cell', text: String(p.elo ?? '—') }));
          }
          cells.push(
            window.ui.el('td', { text: String(p.wins ?? 0) }),
            window.ui.el('td', { text: String(p.games ?? 0) }),
            window.ui.el('td', { text: (p.win_rate ?? 0) + '%' }),
          );
          body.appendChild(window.ui.el('tr', {}, cells));
        });
        const table = window.ui.el('table', {}, [head, body]);
        wrap.appendChild(window.ui.el('div', { class: 'table-wrap' }, [table]));
      }

      modeSelect.addEventListener('change', load);
      load();
    })();
  </script>
</body>
</html>
